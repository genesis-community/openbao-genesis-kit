exodus:
  bosh: some-other-env
  domain: test.domain.com
  features: ""
  ips:
  - 10.1.1.0
  - 10.1.1.1
  - 10.1.1.2
  - 10.1.1.3
  - 10.1.1.4
  is_director: false
  use_create_env: false
instance_groups:
- azs:
  - z1
  instances: 5
  jobs:
  - name: openbao
    properties:
      openbao:
        default_lease_ttl: 1000h
        log_level: debug
        max_lease_ttl: 2000h
        peer:
          tls:
            ca: <!{meta.vault}/certs/ca:certificate!>
            certificate: <!{meta.vault}/certs/peer:certificate!>
            key: <!{meta.vault}/certs/peer:key!>
        tls:
          certificate: <!{meta.vault}/certs/vault:certificate!>
          key: <!{meta.vault}/certs/vault:key!>
        ui: false
    release: openbao
  - name: bpm
    release: bpm
  name: openbao
  networks:
  - name: test-network
    static_ips:
    - 10.1.1.0
    - 10.1.1.1
    - 10.1.1.2
    - 10.1.1.3
    - 10.1.1.4
  persistent_disk_type: test-disk-type
  stemcell: default
  vm_type: test-vm-type
name: base-all-params-openbao
releases:
- name: bpm
  version: latest
- name: openbao
  sha1: sha256:0b0e09d3bced7f38e20a4904bc9e14462cda04d8169055486d232d00d27dcc04
  url: https://github.com/cloudfoundry-community/openbao-boshrelease/releases/download/v0.1.0/openbao-release-v0.1.0.tgz
  version: 0.1.0
stemcells:
- alias: default
  os: test-stemcell
  version: 9.9.9
update:
  canaries: 1
  canary_watch_time: 30000-120000
  max_in_flight: 1
  serial: true
  update_watch_time: 30000-120000
