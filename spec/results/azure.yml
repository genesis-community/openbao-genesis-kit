exodus:
  bosh: azure
  domain: openbao.bosh
  features: ""
  ips:
  - 10.99.0.16
  - 10.99.0.17
  - 10.99.0.18
  is_director: false
  use_create_env: false
instance_groups:
- azs:
  - z1
  instances: 3
  jobs:
  - name: openbao
    properties:
      openbao:
        default_lease_ttl: 768h
        log_level: info
        max_lease_ttl: 768h
        peer:
          tls:
            ca: <!{meta.vault}/certs/ca:certificate!>
            certificate: <!{meta.vault}/certs/peer:certificate!>
            key: <!{meta.vault}/certs/peer:key!>
        tls:
          certificate: <!{meta.vault}/certs/vault:certificate!>
          key: <!{meta.vault}/certs/vault:key!>
        ui: true
    release: openbao
  - name: bpm
    release: bpm
  name: openbao
  networks:
  - name: openbao
    static_ips:
    - 10.99.0.16
    - 10.99.0.17
    - 10.99.0.18
  persistent_disk_type: default
  stemcell: default
  vm_extensions:
  - test-set
  vm_type: default
name: azure-openbao
releases:
- name: bpm
  version: latest
- name: openbao
  sha1: sha256:0b0e09d3bced7f38e20a4904bc9e14462cda04d8169055486d232d00d27dcc04
  url: https://github.com/cloudfoundry-community/openbao-boshrelease/releases/download/v0.1.0/openbao-release-v0.1.0.tgz
  version: 0.1.0
stemcells:
- alias: default
  os: ubuntu-jammy
  version: latest
update:
  canaries: 1
  canary_watch_time: 30000-120000
  max_in_flight: 1
  serial: true
  update_watch_time: 30000-120000
